<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="dynamic-title">$$$</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Exo:wght@600&display=swap');
        body {
            background-color: black;
            color: white;
            font-family: 'Exo', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            transition: filter 0.3s ease-in-out;
        }
        h1 {
            font-size: 3rem;
        }
        .highlight {
            color: purple;
        }
        .button-container {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .button {
            background: linear-gradient(45deg, #6a0dad, #b19cd9);
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease-in-out;
            font-family: 'Exo', sans-serif;
        }
        .button:hover {
            transform: scale(1.05);
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .iframe-container {
            width: 75%;
            height: 75%;
            background: black;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            z-index: 101;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <h1>rbxaccs.<span class="highlight">cyou</span></h1>
    <div class="button-container">
        <button class="button" onclick="showIframe()">hits</button>
        <button class="button">methods</button>
    </div>
    <div class="overlay" id="overlay" onclick="hideIframe()">
        <div class="iframe-container" onclick="event.stopPropagation();">
            <iframe src="C:\Users\Nicholas\Desktop\Desktop\SHORTEN\hits.html"></iframe>
        </div>
    </div>
    <script>
        function showIframe() {
            document.getElementById('overlay').style.display = 'flex';
        }
        function hideIframe() {
            document.getElementById('overlay').style.display = 'none';
        }

        function generateRandomString(length) {
            const characters = '!@#$%^&*)(-=[];';
            let result = '';
            for (let i = 0; i < length; i++) {
                result += characters.charAt(Math.floor(Math.random() * characters.length));
            }
            return result;
        }

        function changeTitle() {
            setInterval(() => {
                document.getElementById('dynamic-title').innerText = generateRandomString(10);
            }, 100);
        }
        changeTitle();
    </script>
</body>
</html>
