<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hits</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        img {
            width: 300px;
            height: auto;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <h1>total hits:/h1>
    <div id="gallery"></div>
    <script>
        const images = [
            'c3183b4836765db8606c113189e22fd8.jpg',
            'c3183b4836765db8606c113189e22fd8.jpg'
        ];
        const gallery = document.getElementById('gallery');
        images.forEach(image => {
            const imgElement = document.createElement('img');
            imgElement.src = 'https://eqate.github.io/assets/' + image; 
            imgElement.alt = image;
            gallery.appendChild(imgElement);
        });
    </script>
</body>
</html>
